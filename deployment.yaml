# kubectl create secret docker-registry ghcr-auth-token --docker-server=ghcr.io --docker-username=bognarpal --docker-password=<TOKEN>
# command for creating a kubernetes secret ^|

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-test-pvc
spec:
  storageClassName: standard
  # volumeName: bognar-pal-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

  #CSAK itt a Jedlikben
  selector:
    matchLabels:
      student: borbely-dominik-pete

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-action-teszt-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-action-teszt
  template:
    metadata:
      labels:
        app: github-action-teszt
    spec:
      containers:
        - name: github-action-teszt-container
          image: ghcr.io/borbely-dominik-peter/ghaction-k8s-13a-acsop:1773397620
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: ghcr-auth-token

#TODO

---

apiVersion: v1
kind: Service
metadata:
  name: github-action-teszt-cluster-ip-service
spec:
  selector:
    app: github-action-teszt
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jokes-certificate
spec:
  secretName: jokes-certificate
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - github-action-0310-borbely-dominik-peter.jcloud.jedlik.cloud

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpmyadmin-test-ingress
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.0.0/16, 193.225.219.0/24
    nginx.ingress.kubernetes.io/ssl-redirect: 'true' 

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - github-action-0310-borbely-dominik-peter.jcloud.jedlik.cloud
      secretName: jokes-certificate
  rules:
    - host: github-action-0310-borbely-dominik-peter.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-action-teszt-cluster-ip-service
                port:
                  number: 80