name: Docker Image CI & Publish to Kubernetes

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # lehetővé teszi, hogy "kézzel" elindítsam a folyamatot
  workflow_dispatch:

  #időzített indítás
  #schedule:
  #  - cron: '04 10 * * *'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: genarate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV


    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag ghcr.io/borbely-dominik-peter/ghaction-k8s-13a-acsop:$IMAGE_TAG
        docker login ghcr.io -u borbely-dominik-peter -p ${{ secrets.GHCR_TOKEN }}
        docker push ghcr.io/borbely-dominik-peter/ghaction-k8s-13a-acsop:$IMAGE_TAG
